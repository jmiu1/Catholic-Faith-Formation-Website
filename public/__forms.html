<html>
  <head></head>
  <body>
    <form name="quote-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote-request" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="service" />
      <input type="text" name="address" />
      <textarea name="details"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <form name="review-submission" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="review-submission" />
      <input type="text" name="name" />
      <input type="text" name="location" />
      <select name="rating">
        <option value="5">5</option>
        <option value="4">4</option>
        <option value="3">3</option>
        <option value="2">2</option>
        <option value="1">1</option>
      </select>
      <textarea name="review"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
